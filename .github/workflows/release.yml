name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt

      - name: Build
        run: |
          pyinstaller --onefile \
            --name anime-monitor-linux \
            --hidden-import aiosqlite \
            --collect-all PIL \
            main.py

      - uses: actions/upload-artifact@v6
        with:
          name: linux-build
          path: dist/anime-monitor-linux

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt

      - name: Build
        run: |
          pyinstaller --onefile --noconsole \
            --name anime-monitor-windows \
            --hidden-import aiosqlite \
            --collect-all PIL \
            main.py

      - uses: actions/upload-artifact@v6
        with:
          name: windows-build
          path: dist/anime-monitor-windows.exe

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: linux-build
          path: release-files/

      - uses: actions/download-artifact@v7
        with:
          name: windows-build
          path: release-files/

      - uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
